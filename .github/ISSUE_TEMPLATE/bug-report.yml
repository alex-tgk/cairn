name: Bug report
description: Report reproducible incorrect Cairn behavior
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest commands or repository state that reproduces the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Cairn version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS arm64, Linux x64, or Windows x64
    validations:
      required: true
